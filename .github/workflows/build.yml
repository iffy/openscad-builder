name: Build OpenSCAD for macOS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      openscad_ref:
        description: 'OpenSCAD git ref to build (branch, tag, or SHA)'
        required: false
        default: 'master'

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
          - arch: x86_64

    steps:
      - name: Checkout OpenSCAD
        uses: actions/checkout@v4
        with:
          repository: openscad/openscad
          ref: ${{ inputs.openscad_ref }}
          submodules: recursive

      - name: Install build prerequisites
        run: brew install automake libtool cmake pkg-config wget meson python-packaging

      - name: Install x86_64 Homebrew (Rosetta)
        if: matrix.arch == 'x86_64'
        run: |
          arch -x86_64 /bin/bash -c \
            "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" </dev/null

      - name: Install dependencies
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            arch -x86_64 ./scripts/macosx-build-homebrew.sh
          else
            ./scripts/macosx-build-homebrew.sh
          fi

      - name: Configure
        run: |
          source scripts/setenv-macos.sh
          cmake -B build \
            -DEXPERIMENTAL=1 \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}

      - name: Build
        run: |
          source scripts/setenv-macos.sh
          cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Install
        run: |
          source scripts/setenv-macos.sh
          cmake --install build

      - name: Package as DMG
        run: |
          source scripts/setenv-macos.sh
          "$OPENSCAD_LIBRARIES/bin/macdeployqt" build/OpenSCAD.app -dmg
          mv build/OpenSCAD.dmg OpenSCAD-${{ matrix.arch }}.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenSCAD-macOS-${{ matrix.arch }}
          path: OpenSCAD-${{ matrix.arch }}.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create timestamped release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TIMESTAMP=$(date -u '+%Y%m%d-%H%M%S')
          TAG="build-${TIMESTAMP}"
          TITLE="OpenSCAD macOS build ${TIMESTAMP}"
          NOTES="Built from openscad/openscad ref \`${{ inputs.openscad_ref }}\` on $(date -u '+%Y-%m-%d %H:%M UTC')."

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$NOTES" \
            artifacts/*.dmg
