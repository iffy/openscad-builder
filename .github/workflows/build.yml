name: Build OpenSCAD for macOS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      openscad_ref:
        description: 'OpenSCAD git ref to build (branch, tag, or SHA)'
        required: false
        default: 'master'

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - name: Checkout OpenSCAD
        uses: actions/checkout@v4
        with:
          repository: openscad/openscad
          ref: ${{ inputs.openscad_ref }}
          submodules: recursive

      - name: Install build prerequisites
        run: brew install automake libtool cmake pkg-config wget meson python-packaging

      - name: Install dependencies
        run: ./scripts/macosx-build-homebrew.sh

      - name: Configure
        run: |
          source scripts/setenv-macos.sh
          cmake -B build -DEXPERIMENTAL=1

      - name: Build
        run: |
          source scripts/setenv-macos.sh
          cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Install
        run: |
          source scripts/setenv-macos.sh
          cmake --install build

      - name: Package as DMG
        run: |
          source scripts/setenv-macos.sh
          "$OPENSCAD_LIBRARIES/bin/macdeployqt" build/OpenSCAD.app -dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenSCAD-macOS-arm64
          path: build/OpenSCAD.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create timestamped release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TIMESTAMP=$(date -u '+%Y%m%d-%H%M%S')
          TAG="build-${TIMESTAMP}"
          TITLE="OpenSCAD macOS build ${TIMESTAMP}"
          NOTES="Built from openscad/openscad ref \`${{ inputs.openscad_ref }}\` on $(date -u '+%Y-%m-%d %H:%M UTC')."

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$NOTES" \
            artifacts/*.dmg
